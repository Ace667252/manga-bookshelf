name: Deploy Website
permissions:
  contents: write

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - uses: actions/checkout@v3

      # 2️⃣ Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies (in manga-bookshelf folder)
      - name: Install dependencies
        run: npm install
        working-directory: ./manga-bookshelf

      # 4️⃣ Build the Vite project
      - name: Build project
        run: npm run build
        working-directory: ./manga-bookshelf

      # 5️⃣ Deploy the built site to GitHub Pages
      - name: Deploy Website
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./manga-bookshelf/dist
